  <rect x="238" y="300" width="36" height="6" rx="2" fill="#4a2a12"/>
  <rect x="238" y="320" width="36" height="6" rx="2" fill="#4a2a12"/>
  <rect x="238" y="340" width="36" height="6" rx="2" fill="#4a2a12"/>
  <!-- Ring -->
